name: WealthDelay Content Agent

on:
  # Run every Monday at 8:00 AM UTC
  schedule:
    - cron: '0 8 * * 1'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no git push)'
        required: false
        default: 'false'
        type: boolean

jobs:
  generate-article:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write  # Required for git push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Configure git identity
        run: |
          git config user.name "WealthDelay Content Agent"
          git config user.email "agent@wealthdelay.com"

      - name: Run content agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python scripts/content-agent.py --dry-run
          else
            python scripts/content-agent.py
          fi

      - name: Upload article artifact (dry run only)
        if: ${{ inputs.dry_run == true }}
        uses: actions/upload-artifact@v4
        with:
          name: generated-article
          path: '*.html'
          retention-days: 7
